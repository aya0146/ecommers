<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique Online</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Helvetica Neue', Arial;}
body{background: linear-gradient(120deg,#1a1a1a,#111);color:#fff;}

/* الهيدر */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:rgba(0,0,0,0.3);
    flex-wrap:wrap;
}
header h1{
    flex:1;
    text-align:center;
    font-size:2rem;
    margin-bottom:5px;
}
header div{display:flex;align-items:center;gap:10px;}
.role{color:#ff4c4c;}

/* البحث */
.search-bar{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}
.search-bar input{
    width:250px;
    padding:6px;
    border-radius:8px;
    border:none;
}
.search-bar button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:#fff;
}

/* شبكة المنتجات */
.grid{
    display:grid;
    gap:20px;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    justify-items:center;
    transition: all 0.3s ease;
}
.card{
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    overflow:hidden;
    transition: transform 0.2s;
    width:100%;
    max-width:250px;
}
.card:hover{transform: scale(1.02);}
.card img{
    width:100%;
    height:auto;
    object-fit:cover;
    border-bottom:1px solid rgba(255,255,255,0.1);
}
.info{
    padding:10px;
    text-align:center;
}
.info h3{
    font-size:1rem;
    margin:5px 0;
}
.info p{
    font-size:0.9rem;
    margin:3px 0;
}
.price{color:#ff4c4c;font-weight:800;}

/* أزرار */
button{
    margin:3px;
    padding:6px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.btn-book{background:#007bff;color:#fff;}
.btn-edit{background:#ffc107;}
.btn-delete{background:#dc3545;color:#fff;}
.btn-add{background:#28a745;color:#fff;}

/* السلة */
.cart{
    position:fixed;
    right:10px;
    top:80px;
    width:250px;
    background:#000;
    padding:10px;
    border-radius:10px;
    display:none; /* مخفية بشكل افتراضي */
}
#cartItems div{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:5px;
    font-size:0.9rem;
}
#cartItems button{
    background:#dc3545;
    color:#fff;
    border-radius:50%;
    width:20px;
    height:20px;
    line-height:16px;
    text-align:center;
    font-size:0.8rem;
    padding:0;
}

/* نافذة منبثقة للأدمين */
.modal{
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:1000;
}
.modal-content{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    width:300px;
    max-width:90%;
    position:relative;
}
.modal-content h3{
    margin-bottom:15px;
    text-align:center;
    color:#ff4c4c;
}
.modal-content input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
    background:#222;
    color:#fff;
}
.modal-content button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
    background:#28a745;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}
.modal-content .close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:20px;
    cursor:pointer;
    color:#fff;
}

/* الرسائل الصغيرة */
.success-message{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#28a745;
    padding:10px 15px;
    border-radius:10px;
    color:#fff;
    opacity:0;
    transition:opacity 0.3s;
}

/* عرض المنتج الواحد عند البحث */
.grid.single-product{
    grid-template-columns:1fr;
}
.grid.single-product .card{
    max-width:300px;
}

/* زر الرجوع */
#btnBack{
    display:none;
    margin:15px auto;
    padding:10px 20px;
    background:#007bff;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    display:block;
}

/* Responsive */
@media(max-width:600px){
    header h1{font-size:1.5rem;}
    .grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}
    .card{max-width:180px;}
    .info h3{font-size:0.9rem;}
    .info p{font-size:0.8rem;}
}
</style>
</head>
<body>

<header>
    <h1>Boutique Online</h1>
    <div>
        <span class="role" id="roleDisplay"></span>
        <button id="btnAddProduct" class="btn-add" style="display:none;">Add Product</button>
    </div>
</header>

<div class="container">
    <div class="search-bar">
        <input id="searchInput" placeholder="Search...">
        <button onclick="searchProducts()">Search</button>
    </div>
    <button id="btnBack" onclick="showAllProducts()">← Back to Products</button>
    <div class="grid" id="productGrid"></div>
</div>

<div class="cart" id="cartDiv">
    <h3>Cart 🛒</h3>
    <div id="cartItems"></div>
</div>

<button id="totalBtn" onclick="toggleCart()" style="
    position:fixed;
    right:10px;
    top:20px;
    width:100px;
    padding:10px;
    background:#ff4c4c;
    color:#fff;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
">Total: $0</button>

<div id="modalAddProduct" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3>Add New Product</h3>
        <input type="text" id="newName" placeholder="Product Name">
        <input type="number" id="newPrice" placeholder="Price">
        <input type="number" id="newQty" placeholder="Quantity">
        <input type="text" id="newImg" placeholder="Image URL">
        <button onclick="confirmAddProduct()">Add Product</button>
    </div>
</div>

<div id="successMsg" class="success-message">Added to Cart!</div>

<script>
let currentUser = localStorage.getItem('currentUser');
if(!currentUser){ alert('Please login first!'); window.location.href = 'login.html'; }

let role = localStorage.getItem("role") || "user";
document.getElementById("roleDisplay").textContent = "Role: " + role;
if(role === "admin"){ document.getElementById("btnAddProduct").style.display = "inline-block"; }

let products = JSON.parse(localStorage.getItem("products")) || [
    {name:"Pencils", price:10, qty:20, img:"pencils.jpg"},
    {name:"Markers", price:30, qty:15, img:"markers.jpg"},
    {name:"Notebooks", price:25, qty:10, img:"notebooks.jpg"}
];

let cartKey = 'cart_' + currentUser;
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

function renderProducts(list=products){
    const grid = document.getElementById("productGrid");
    grid.innerHTML="";

    // زر الرجوع يظهر دائمًا إذا هناك بحث نشط
    if(searchInput.value.trim() !== ""){ 
        document.getElementById("btnBack").style.display="block"; 
    } else { 
        document.getElementById("btnBack").style.display="none"; 
    }

    // إذا كان هناك منتج واحد، نطبق تنسيق خاص
    if(list.length === 1){ 
        grid.classList.add("single-product"); 
    } else { 
        grid.classList.remove("single-product"); 
    }

    list.forEach((p,i)=>{
        let card=document.createElement("div");
        card.className="card";

        let userButton = role === "admin" 
            ? `<button class="btn-edit" onclick="editProduct(${i})">Edit</button>
               <button class="btn-delete" onclick="deleteProduct(${i})">Delete</button>`
            : `<button class="btn-book" onclick="addToCart(${i})">Add to Cart</button>`;

        card.innerHTML=`
            <img src="${p.img}">
            <div class="info">
                <h3>${p.name}</h3>
                <p>Stock: ${p.qty}</p>
                <p class="price">$${p.price}</p>
                ${userButton}
            </div>
        `;
        grid.appendChild(card);
    });
}

// البحث: المنتجات التي تبدأ بالحروف المدخلة
function searchProducts(){
    let val=document.getElementById("searchInput").value.toLowerCase();
    let filtered = products.filter(p=>p.name.toLowerCase().startsWith(val));
    renderProducts(filtered);
}
// زر الرجوع
function showAllProducts(){
    searchInput.value="";
    renderProducts(products);
}

// Admin
function editProduct(i){ 
    let newPrice=prompt("Enter new price:",products[i].price); 
    let newQty=prompt("Enter new quantity:",products[i].qty); 
    if(newPrice!==null && newQty!==null){products[i].price=parseFloat(newPrice); products[i].qty=parseInt(newQty); saveProducts(); renderProducts();}
}
function deleteProduct(i){ if(confirm("Are you sure?")){ products.splice(i,1); saveProducts(); renderProducts(); }}

function addProduct(){ document.getElementById("modalAddProduct").style.display="flex";}
function confirmAddProduct(){
    let name=document.getElementById("newName").value;
    let price=document.getElementById("newPrice").value;
    let qty=document.getElementById("newQty").value;
    let img=document.getElementById("newImg").value;
    if(name && price && qty && img){
        products.push({name:name, price:parseFloat(price), qty:parseInt(qty), img:img});
        saveProducts(); renderProducts(); closeModal();
    } else { alert("Please fill all fields!"); }
}
function closeModal(){ 
    document.getElementById("modalAddProduct").style.display="none";
    document.getElementById("newName").value=""; 
    document.getElementById("newPrice").value=""; 
    document.getElementById("newQty").value=""; 
    document.getElementById("newImg").value="";
}

// User
function addToCart(i){ 
    cart.push(products[i]); 
    saveCart(); 
    updateTotal();
    showSuccess("Added to Cart!"); 
}

function renderCart(){ 
    let div=document.getElementById("cartItems"); 
    div.innerHTML="";
    cart.forEach((c,i)=>{
        let itemDiv = document.createElement("div");
        itemDiv.innerHTML = `${c.name} - $${c.price} <button onclick="removeCart(${i})">X</button>`;
        div.appendChild(itemDiv);
    });
}

function removeCart(i){ 
    cart.splice(i,1); 
    saveCart(); 
    renderCart(); 
    updateTotal();
}

// تحديث المجموع الإجمالي
function updateTotal(){
    let total=cart.reduce((sum,c)=>sum+c.price,0);
    document.getElementById("totalBtn").textContent="Total: $"+total;
}

// إظهار أو إخفاء السلة عند الضغط على زر Total
function toggleCart(){
    const cartDiv = document.getElementById("cartDiv");
    if(cartDiv.style.display==="none" || cartDiv.style.display===""){
        renderCart();
        cartDiv.style.display="block";
    } else {
        cartDiv.style.display="none";
    }
}

// البحث
function searchProducts(){
    let val=document.getElementById("searchInput").value.toLowerCase();
    let filtered = products.filter(p=>p.name.toLowerCase().startsWith(val));
    renderProducts(filtered);
}

function saveProducts(){ localStorage.setItem("products",JSON.stringify(products)); }
function saveCart(){ localStorage.setItem(cartKey, JSON.stringify(cart)); }
function showSuccess(msg){ let el=document.getElementById("successMsg"); el.textContent=msg; el.style.opacity="1"; setTimeout(()=>{el.style.opacity="0";},1500); }

document.getElementById("btnAddProduct").addEventListener("click", addProduct);

// تشغيل
renderProducts();
updateTotal();
</script>
</body>
</html>
